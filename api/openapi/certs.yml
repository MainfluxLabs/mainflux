  /certs/{certID}/download:
    get:
      summary: Downloads a certificate
      description: |
        Retrieves the full certificate data (certificate, private key, issuing CA,
        CA chain) for a given cert ID and marks it as downloaded. A certificate can
        only be downloaded once. Subsequent attempts return 403.
      tags:
        - certs
      parameters:
