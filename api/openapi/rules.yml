openapi: 3.0.1
info:
  title: Mainflux rules service
  description: HTTP API for managing platform rules.
  version: 1.0.0

paths:
  /groups/{groupId}/rules:
    post:
      summary: Adds new rules
      description: Adds new rules to the list of rules for certain group identified by the provided ID
      tags:
        - rules
      parameters:
        - $ref: "#/components/parameters/GroupId"
      requestBody:
        $ref: "#/components/requestBodies/CreateRulesReq"
      responses:
        '201': 
          $ref: "#/components/responses/CreateRulesRes"
        '400':
          description: Failed due to malformed JSON.
        '401':
          description: Missing or invalid access token provided.
        '403':
          description: Failed to perform authorization over the entity.
        '415':
          description: Missing or invalid content type.
        '500':
          $ref: "#/components/responses/ServiceError"
    get:
      summary: Retrieves rules by group
      description: Retrieves list of rules related to a certain group identified by the provided ID.
      tags:
        - rules
      parameters:
        - $ref: "#/components/parameters/GroupId"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - $ref: "#/components/parameters/Order"
        - $ref: "#/components/parameters/Dir"
        - $ref: "#/components/parameters/Name"
        - $ref: "#/components/parameters/InputType"
      responses:
        '200':
          $ref: "#/components/responses/ListRulesRes"
        '400':
          description: Failed due to malformed query parameters.
        '401':
          description: Missing or invalid access token provided.
        '403':
          description: Failed to perform authorization over the entity.
        '422':
          description: Database can't process request.
        '500':
          $ref: "#/components/responses/ServiceError"
  /things/{thingId}/rules:
    get:
      summary: Retrieves rules assigned to a thing
      description: Retrieves list of rules assigned to a specific thing identified by the provided ID.
      tags:
        - rules
      parameters:
        - $ref: "#/components/parameters/ThingId"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - $ref: "#/components/parameters/Order"
        - $ref: "#/components/parameters/Dir"
        - $ref: "#/components/parameters/Name"
        - $ref: "#/components/parameters/InputType"
      responses:
        '200':
          $ref: "#/components/responses/ListRulesRes"
        '400':
          description: Failed due to malformed query parameters.
        '401':
          description: Missing or invalid access token provided.
        '403':
          description: Failed to perform authorization over the entity.
        '422':
          description: Database can't process request.
        '500':
          $ref: "#/components/responses/ServiceError"
  /rules/{ruleId}/things:
    get:
      summary: Retrieves thing IDs assigned to a rule
      description: Retrieves list of thing IDs that have the specified rule assigned.
      tags:
        - rules
      parameters:
        - $ref: "#/components/parameters/RuleId"
      responses:
        '200':
          $ref: "#/components/responses/ListThingIDsRes"
        '400':
          description: Failed due to malformed query parameters.
        '401':
          description: Missing or invalid access token provided.
        '404':
          description: Rule does not exist.
        '422':
          description: Database can't process request.
        '500':
          $ref: "#/components/responses/ServiceError"
    post:
      summary: Assigns things to a rule
      description: Assigns one or more things to a specific rule identified by the provided ID.
      tags:
        - rules
      parameters:
        - $ref: "#/components/parameters/RuleId"
      requestBody:
        $ref: "#/components/requestBodies/RuleThingsReq"
      responses:
        '200':
          description: Things assigned successfully.
        '400':
          description: Failed due to malformed JSON.
        '401':
          description: Missing or invalid access token provided.
        '404':
          description: Rule does not exist.
        '409':
          description: One or more things are already assigned to this rule.
        '415':
          description: Missing or invalid content type.
        '500':
          $ref: "#/components/responses/ServiceError"
    patch:
      summary: Unassigns things from a rule
      description: Unassigns one or more things from a specific rule identified by the provided ID.
      tags:
        - rules
      parameters:
        - $ref: "#/components/parameters/RuleId"
      requestBody:
        $ref: "#/components/requestBodies/RuleThingsReq"
      responses:
        '204':
          description: Things unassigned successfully.
        '400':
          description: Failed due to malformed JSON.
        '401':
          description: Missing or invalid access token provided.
        '415':
          description: Missing or invalid content type.
        '500':
          $ref: "#/components/responses/ServiceError"
  /rules/{ruleId}:
    get:
      summary: Retrieves rule info
      tags:
        - rules
      parameters:
        - $ref: "#/components/parameters/RuleId"
      responses:
        '200':
          $ref: "#/components/responses/RuleRes"
        '400':
          description: Failed due to malformed query parameters.
        '401':
          description: Missing or invalid access token provided.
        '404':
          description: Rule does not exist.
        '422':
          description: Database can't process request.
        '500':
          $ref: "#/components/responses/ServiceError"
    put:
      summary: Updates rule info
      description: Update is performed by replacing the current resource data with values provided in a request payload.
      tags:
        - rules
      parameters:
        - $ref: "#/components/parameters/RuleId"
      requestBody:
        $ref: "#/components/requestBodies/UpdateRuleReq"
      responses:
        '200':
          description: Rule updated.
        '400':
          description: Failed due to malformed JSON.
        '401':
          description: Missing or invalid access token provided.
        '404':
          description: Rule does not exist.
        '415':
          description: Missing or invalid content type.
        '500':
          $ref: "#/components/responses/ServiceError"
  /rules:
    patch:
      summary: Removes rules
      description: Removes rules with provided identifiers.
      tags:
        - rules
      requestBody:
        $ref: "#/components/requestBodies/RemoveRulesReq"
      responses:
        '204':
          description: Rules removed.
        '400':
          description: Failed due to malformed JSON.
        '401':
          description: Missing or invalid access token provided.
        '404':
          description: One or more rules do not exist.
        '500':
          $ref: "#/components/responses/ServiceError"
  /groups/{groupId}/scripts:
    post:
      summary: Create Lua scripts.
      description: Add new Lua scripts to a specific Group
      tags:
        - scripts
      parameters:
        - $ref: "#/components/parameters/GroupId"
      requestBody:
        $ref: "#/components/requestBodies/CreateScriptsReq"
      responses:
        '201':
          $ref: "#/components/responses/CreateScriptsRes"
        '400':
          description: Failed due to malformed JSON.
        '401':
          description: Missing or invalid access token provided.
        '403':
          description: Failed to perform authorization over the entity.
        '415':
          description: Missing or invalid content type.
        '500':
          $ref: "#/components/responses/ServiceError"
    get:
      summary: Retrieve Scripts by Group.
      description: Retrieves a list of Lua scripts related to a certain group identified by the provided ID.
      tags:
        - scripts
      parameters:
        - $ref: "#/components/parameters/GroupId"
      responses:
        '200':
          $ref: "#/components/responses/ListScriptsRes"
        '400':
          description: Failed due to malformed query parameters.
        '401':
          description: Missing or invalid access token provided.
        '403':
          description: Failed to perform authorization over the entity.
        '422':
          description: Database can't process request.
        '500':
          $ref: "#/components/responses/ServiceError"
  /things/{thingId}/scripts:
    get:
      summary: Retrieve Scripts assigned to a Thing.
      description: Retrieves a list of Lua scripts assigned to a specific Thing identified by the provided ID.
      tags:
        - scripts
      parameters:
        - $ref: "#/components/parameters/ThingId"
      responses:
        '200':
          $ref: "#/components/responses/ListScriptsRes"
        '400':
          description: Failed due to malformed query parameters.
        '401':
          description: Missing or invalid access token provided.
        '403':
          description: Failed to perform authorization over the entity.
        '422':
          description: Database can't process request.
        '500':
          $ref: "#/components/responses/ServiceError"
    post:
      summary: Assign Scripts to a Thing.
      description: Assigns one or more Lua scripts to a specific thing identified by the provided ID.
      tags:
        - scripts
      parameters:
        - $ref: "#/components/parameters/ThingId"
      requestBody:
        $ref: "#/components/requestBodies/ThingScriptsReq"
      responses:
        '200':
          description: Scripts assigned successfully.
        '400':
          description: Failed due to malformed JSON.
        '401':
          description: Missing or invalid access token provided.
        '403':
          description: Failed to perform authorization over the entity.
        '404':
          description: Thing or one of the scripts does not exist.
        '415':
          description: Missing or invalid content type.
        '500':
          $ref: "#/components/responses/ServiceError"
    patch:
      summary: Unassign Scripts from Thing.
      description: Unassigns Lua scripts from a specific thing identified by the provided ID.
      tags:
        - scripts
      parameters:
        - $ref: "#/components/parameters/ThingId"
      requestBody:
        $ref: "#/components/requestBodies/ThingScriptsReq"
      responses:
        '200':
          description: Scripts unassigned successfully.
        '400':
          description: Failed due to malformed JSON.
        '401':
          description: Missing or invalid access token provided.
        '403':
          description: Failed to perform authorization over the entity.
        '404':
          description: Thing or one of the scripts does not exist.
        '415':
          description: Missing or invalid content type.
        '500':
          $ref: "#/components/responses/ServiceError"
  /scripts/{scriptId}/things:
    get:
      summary: Retrieve list of IDs of Things assigned a specific Script identified by the provided ID.
      description: Retrieve list of IDs of Things assigned a specific Script identified by the provided ID.
      tags:
        - scripts
      parameters:
        - $ref: "#/components/parameters/ScriptId"
      responses:
        '200':
          $ref: "#/components/responses/ListThingIDsRes"
        '400':
          description: Failed due to malformed query parameters.
        '401':
          description: Missing or invalid access token provided.
        '403':
          description: Failed to perform authorization over the entity.
        '404':
          description: Script does not exist.
        '422':
          description: Database can't process request.
        '500':
          $ref: "#/components/responses/ServiceError"
  /scripts/{scriptId}:
    get:
      summary: Retrieve a specific Script.
      tags:
        - scripts
      parameters:
        - $ref: "#/components/parameters/ScriptId"
      responses:
        '200':
          $ref: "#/components/responses/ScriptRes"
        '401':
          description: Missing or invalid access token provided.
        '404':
          description: Script does not exist.
        '422':
          description: Database can't process request.
        '500':
          $ref: "#/components/responses/ServiceError"
    put:
      summary: Update a specific Script.
      description: Update script data.
      tags:
        - scripts
      parameters:
        - $ref: "#/components/parameters/ScriptId"
      requestBody:
        $ref: "#/components/requestBodies/UpdateScriptReq"
      responses:
        '200':
          description: Script updated.
        '400':
          description: Failed due to malformed JSON.
        '401':
          description: Missing or invalid access token provided.
        '404':
          description: Script does not exist.
        '415':
          description: Missing or invalid content type.
        '500':
          $ref: "#/components/responses/ServiceError"
  /scripts:
    patch:
      summary: Remove scripts.
      description: Remove one or more Lua scripts with provided IDs.
      tags:
        - scripts
      requestBody:
        $ref: "#/components/requestBodies/RemoveScriptsReq"
      responses:
        '204':
          description: Scripts removed.
        '400':
          description: Failed due to malformed JSON.
        '401':
          description: Missing or invalid access token provided.
        '500':
          $ref: "#/components/responses/ServiceError"
  /things/{thingId}/runs:
    get:
      summary: Retrieve Script runs for a Thing.
      description: Retrieve a list of script run history for a specific Thing identified by the provided ID.
      tags:
        - script-runs
      parameters:
        - $ref: "#/components/parameters/ThingId"
      responses:
        '200':
          $ref: "#/components/responses/ListScriptRunsRes"
        '400':
          description: Failed due to malformed query parameters.
        '401':
          description: Missing or invalid access token provided.
        '403':
          description: Failed to perform authorization over the entity.
        '422':
          description: Database can't process request.
        '500':
          $ref: "#/components/responses/ServiceError"
  /runs:
    patch:
      summary: Removes script runs
      description: Remove script run records with provided IDs.
      tags:
        - script-runs
      requestBody:
        $ref: "#/components/requestBodies/RemoveScriptRunsReq"
      responses:
        '204':
          description: Script runs removed.
        '400':
          description: Failed due to malformed JSON.
        '401':
          description: Missing or invalid access token provided.
        '500':
          $ref: "#/components/responses/ServiceError"

components:
  schemas:
    Input:
      type: object
      description: Defines what triggers the rule evaluation.
      properties:
        type:
          type: string
          enum: [message, alarm, schedule, command]
          example: "message"
        thing_ids:
          type: array
          description: IDs of things to which this rule applies.
          items:
            type: string
            format: uuid
          example: ["123e4567-e89b-12d3-a456-426614174000"]
      required: [type]
    UpdateRuleInput:
      type: object
      description: Input configuration for rule update. Thing assignments are managed separately via the assign/unassign endpoints.
      properties:
        type:
          type: string
          enum: [message, alarm, schedule, command]
          example: "message"
      required: [type]
    Condition:
      type: object
      properties:
        field:
          type: string
          example: "temperature"
        comparator:
          type: string
          example: ">="
        threshold:
          type: number
          example: 45
      required: [field, comparator, threshold]
    Action:
      type: object
      properties:
        id:
          type: string
          description: Required for smtp and smpp actions.
          example: "513e2557-e09b-42d3-s456-425614175403"
        type:
          type: string
          enum: [ smtp, smpp, alarm ]
          example: "smtp"
        level:
          type: integer
          minimum: 1
          maximum: 5
          description: "Alarm severity level. Required for alarm actions: 1=info, 2=warning, 3=minor, 4=major, 5=critical."
          example: 3
      required:
        - type
    RuleReqSchema:
      type: object
      properties:
        name:
          type: string
          example: "Temperature and Humidity Alert"
        description:
          type: string
          example: "Triggers when temperature exceeds 45°C and humidity drops below 20%"
        input:
          $ref: "#/components/schemas/Input"
        conditions:
          type: array
          items:
            $ref: "#/components/schemas/Condition"
        operator:
          type: string
          enum: [AND, OR]
          description: Required when more than one condition is defined.
          example: "AND"
        actions:
          type: array
          items:
            $ref: "#/components/schemas/Action"
      required: [name, input, conditions, actions]
    UpdateRuleReqSchema:
      type: object
      properties:
        name:
          type: string
          example: "Temperature Alert"
        description:
          type: string
          example: "Triggers when temperature exceeds 50°C"
        input:
          $ref: "#/components/schemas/UpdateRuleInput"
        conditions:
          type: array
          items:
            $ref: "#/components/schemas/Condition"
        operator:
          type: string
          enum: [AND, OR]
          description: Required when more than one condition is defined.
          example: "AND"
        actions:
          type: array
          items:
            $ref: "#/components/schemas/Action"
      required: [name, input, conditions, actions]
    RuleResSchema:
      type: object
      properties:
        id:
          type: string
          example: "789e4567-e89b-12d3-a456-426614174abc"
        group_id:
          type: string
          example: "321e4567-e89b-12d3-a456-426614174def"
        name:
          type: string
          example: "Temperature and Humidity Alert"
        description:
          type: string
          example: "Triggers when temperature exceeds 45°C and humidity drops below 20%"
        input:
          $ref: "#/components/schemas/Input"
        conditions:
          type: array
          items:
            $ref: "#/components/schemas/Condition"
        operator:
          type: string
          example: "AND"
        actions:
          type: array
          items:
            $ref: "#/components/schemas/Action"
      required: [ id, group_id, name, input, conditions, actions ]
    ThingIDsRes:
      type: object
      properties:
        thing_ids:
          type: array
          items:
            type: string
            format: uuid
          example: ["123e4567-e89b-12d3-a456-426614174000", "123e4567-e89b-12d3-a456-426614174001"]
    ScriptReqSchema:
      type: object
      properties:
        name:
          type: string
          example: "Low temperature notifier"
        description:
          type: string
          example: "Creates alarm and executes SMTP notifier on low temperature reading"
        script:
          $ref: "#/components/schemas/ExampleScript"
      required: [name, script]
    ScriptResSchema:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: "456e4567-e89b-12d3-a456-426614174abc"
        group_id:
          type: string
          format: uuid
          example: "321e4567-e89b-12d3-a456-426614174def"
        name:
          type: string
          example: "Low temperature notifier"
        description:
          type: string
          example: "Creates alarm and executes SMTP notifier on low temperature reading"
        script:
          $ref: "#/components/schemas/ExampleScript"
      required: [id, group_id, name, script]
    ScriptRunResSchema:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: "789e4567-e89b-12d3-a456-426614174xyz"
        script_id:
          type: string
          format: uuid
          example: "456e4567-e89b-12d3-a456-426614174abc"
        thing_id:
          type: string
          format: uuid
          example: "123e4567-e89b-12d3-a456-426614174000"
        logs:
          type: array
          items:
            type: string
          example: ["Processing message", "Temperature converted successfully"]
        started_at:
          type: string
          format: date-time
          example: "2024-01-15T10:30:00Z"
        finished_at:
          type: string
          format: date-time
          example: "2024-01-15T10:30:01Z"
        status:
          type: string
          enum: [success, fail]
          example: "success"
        error:
          type: string
          example: ""
      required: [id, script_id, thing_id, logs, started_at, finished_at, status]
    ExampleScript:
      type: string
      example: |
          local payload = mfx.message.payload

          local temp = tonumber(payload["temperature"])
          local hum  = tonumber(payload["humidity"])

          if not temp or not hum or hum <= 0 then
            mfx.log("Invalid or missing fields")
            return
          end

          -- Magnus formula: dew point from temperature and relative humidity
          local gamma = math.log(hum / 100.0) + (17.625 * temp) / (243.04 + temp)
          local dew_point = 243.04 * gamma / (17.625 - gamma)
          local spread = temp - dew_point  -- smaller spread → closer to condensation

          mfx.log(string.format("temp=%.1f  hum=%.1f%%  dew_point=%.1f  spread=%.1f",
            temp, hum, dew_point, spread))

          -- Condensation risk: surface is near or below dew point
          if spread <= 2.0 then
            mfx.log("Condensation risk: spread=" .. string.format("%.1f", spread) .. "°C")
            mfx.create_alarm(3)
            mfx.smtp_notify("654e4567-e89b-12d3-a456-426614174999")
          end

  parameters:
    RuleId:
      name: ruleId
      description: Unique rule identifier.
      in: path
      schema:
        type: string
        format: uuid
      example: "789e4567-e89b-12d3-a456-426614174abc"
      required: true
    GroupId:
      name: groupId
      description: Unique group identifier.
      in: path
      schema:
        type: string
        format: uuid
      example: "321e4567-e89b-12d3-a456-426614174def"
      required: true
    ThingId:
      name: thingId
      description: Unique thing identifier.
      in: path
      schema:
        type: string
        format: uuid
      example: "123e4567-e89b-12d3-a456-426614174000"
      required: true
    ScriptId:
      name: scriptId
      description: Unique script identifier.
      in: path
      schema:
        type: string
        format: uuid
      example: "456e4567-e89b-12d3-a456-426614174abc"
      required: true
    Limit:
      name: limit
      description: Maximum number of results to return (1–200).
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 100
      example: 10
    Offset:
      name: offset
      description: Number of results to skip.
      in: query
      schema:
        type: integer
        minimum: 0
        default: 0
      example: 0
    Order:
      name: order
      description: Field to sort results by.
      in: query
      schema:
        type: string
        enum: [name]
      example: "name"
    Dir:
      name: dir
      description: Sort direction. Required when order is specified.
      in: query
      schema:
        type: string
        enum: [asc, desc]
      example: "asc"
    Name:
      name: name
      description: Filter results by name (partial match).
      in: query
      schema:
        type: string
      example: "Temperature"
    InputType:
      name: input_type
      description: Filter results by input type.
      in: query
      schema:
        type: string
        enum: [message, alarm, schedule, command]
      example: "message"

  requestBodies:
    CreateRulesReq:
      description: JSON-formatted document describing the new rules.
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              rules:
                type: array
                items:
                  $ref: "#/components/schemas/RuleReqSchema"
            required:
              - rules
          example:
            rules:
              - name: "Temperature and Humidity Alert"
                description: "Triggers when temperature exceeds 45°C and humidity drops below 20%"
                input:
                  type: "message"
                  thing_ids:
                    - "123e4567-e89b-12d3-a456-426614174000"
                conditions:
                  - field: "temperature"
                    comparator: ">"
                    threshold: 45
                  - field: "humidity"
                    comparator: "<"
                    threshold: 20
                operator: "AND"
                actions:
                  - type: "smtp"
                    id: "513e2557-e09b-42d3-s456-425614175403"
                  - type: "alarm"
                    level: 3
    UpdateRuleReq:
      description: JSON-formatted document describing the updated rule. Thing assignments are not affected — use POST/PATCH /rules/{ruleId}/things instead.
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/UpdateRuleReqSchema"
          example:
            name: "Temperature Alert"
            description: "Triggers when temperature exceeds 50°C"
            input:
              type: "message"
            conditions:
              - field: "temperature"
                comparator: ">"
                threshold: 50
            actions:
              - type: "alarm"
                level: 3
    RemoveRulesReq:
      description: JSON-formatted document describing the identifiers of rules for deleting.
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              rule_ids:
                type: array
                items:
                  type: string
                  format: uuid
            required:
              - rule_ids
          example:
            rule_ids:
              - "789e4567-e89b-12d3-a456-426614174abc"
              - "654e4567-e89b-12d3-a456-426614174999"
    RuleThingsReq:
      description: JSON-formatted document describing the thing identifiers to assign/unassign.
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              thing_ids:
                type: array
                items:
                  type: string
                  format: uuid
            required:
              - thing_ids
          example:
            thing_ids:
              - "123e4567-e89b-12d3-a456-426614174000"
              - "123e4567-e89b-12d3-a456-426614174001"
    CreateScriptsReq:
      description: JSON-formatted document describing the new Lua scripts.
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              scripts:
                type: array
                items:
                  $ref: "#/components/schemas/ScriptReqSchema"
            required:
              - scripts
          example:
            scripts:
              - name: "Low temperature notifier"
                description: "Create alarm and send SMTP notification on low temperature."
                script:
                  $ref: "#/components/schemas/ExampleScript"
    UpdateScriptReq:
